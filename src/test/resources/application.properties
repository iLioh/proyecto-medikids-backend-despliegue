# Spring Boot Test Configuration - H2 In-Memory Database

# Database Configuration (H2 in-memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (optional, for debugging)
spring.h2.console.enabled=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Mail in Tests
spring.mail.host=
spring.mail.port=0
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# JWT Configuration (Test values)
jwt.secret=test-secret-key-for-medikids-backend-testing-purposes-only-1234567890
jwt.expiration=3600000
jwt.admin.expiration=1800000
jwt.refresh.expiration=604800000

# 2FA Configuration
codigo.2fa.expiration=604800000

# Admin seeded user password for tests
admin.secret-password=MiPasswordSuperSeguro123

# Logging
logging.level.root=WARN
logging.level.com.medikids.medikids=INFO
logging.level.org.springframework.test=INFO

# Disable unnecessary auto-configurations for testing
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
