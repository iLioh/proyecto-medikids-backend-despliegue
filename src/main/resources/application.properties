spring.application.name=backend-Medikids
server.port=5000

# spring.profiles.active=local

server.servlet.context-path=/api

# ‚îÄ‚îÄ Base de Datos ‚îÄ‚îÄ
spring.datasource.url=jdbc:mysql://${RDS_HOSTNAME}:${RDS_PORT}/${RDS_DB_NAME}
spring.datasource.username=${RDS_USERNAME}
spring.datasource.password=${RDS_PASSWORD}
spring.jpa.hibernate.ddl-auto=update

# ‚îÄ‚îÄ Mail SMTP ‚îÄ‚îÄ
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ‚îÄ‚îÄ JWT ‚îÄ‚îÄ
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000
jwt.admin.expiration=900000
jwt.refresh.expiration=604800000

# ‚îÄ‚îÄ 2FA ‚îÄ‚îÄ
codigo.2fa.expiration=300000

# ‚îÄ‚îÄ Frontend ‚îÄ‚îÄ
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ‚îÄ‚îÄ Gemini AI Chatbot ‚îÄ‚îÄ
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=gemini-2.5-flash-lite

# ‚îÄ‚îÄ Admin Seeder ‚îÄ‚îÄ
admin.secret-password=${ADMIN_SECRET}
